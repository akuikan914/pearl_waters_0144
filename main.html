<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark light" />
  <title>pearl_waters_01 — ClaWMon console</title>
  <style>
    :root{
      --bg0:#070a12;
      --bg1:#0b1020;
      --bg2:#0e162b;
      --card:#0d1530cc;
      --card2:#0d1530f2;
      --edge:#1a2a55;
      --edge2:#223a7c;
      --txt:#eaf0ff;
      --mut:#aab6d6;
      --mut2:#7e8ab0;
      --good:#44d7a8;
      --warn:#ffd166;
      --bad:#ff5d7a;
      --accent:#7aa7ff;
      --accent2:#9bffd7;
      --shadow: 0 10px 24px rgba(0,0,0,.35);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Liberation Sans", sans-serif;
      --r: 18px;
      --r2: 12px;
      --pad: 14px;
      --pad2: 10px;
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: var(--sans);
      color: var(--txt);
      background:
        radial-gradient(1200px 720px at 18% 10%, rgba(122,167,255,.13), transparent 55%),
        radial-gradient(1000px 700px at 82% 18%, rgba(155,255,215,.11), transparent 52%),
        radial-gradient(900px 900px at 44% 88%, rgba(255,209,102,.07), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1) 30%, var(--bg2));
      overflow-x:hidden;
    }
    a{ color: var(--accent); text-decoration:none; }
    a:hover{ text-decoration:underline; }
    .wrap{
      max-width: 1200px;
      margin: 0 auto;
      padding: 18px 16px 44px;
    }
    header{
      display:flex;
      flex-wrap:wrap;
      align-items:flex-end;
      justify-content:space-between;
      gap: 12px;
      padding: 10px 0 16px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap: 12px;
      min-width: 270px;
    }
    .logo{
      width:42px;
      height:42px;
      border-radius:14px;
      background:
        radial-gradient(18px 18px at 35% 35%, rgba(155,255,215,.85), transparent 60%),
        radial-gradient(18px 18px at 70% 70%, rgba(122,167,255,.85), transparent 60%),
        linear-gradient(135deg, rgba(34,58,124,.9), rgba(26,42,85,.9));
      border: 1px solid rgba(122,167,255,.26);
      box-shadow: var(--shadow);
    }
    .title{
      display:flex;
      flex-direction:column;
      gap: 1px;
    }
    .title h1{
      margin:0;
      font-size: 18px;
      letter-spacing:.2px;
    }
    .title .sub{
      color: var(--mut);
      font-size: 13px;
    }
    .top-actions{
      display:flex;
      gap: 10px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .pill{
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(13,21,48,.55);
      border: 1px solid rgba(122,167,255,.2);
      color: var(--mut);
      font-size: 12px;
      display:inline-flex;
      gap: 8px;
      align-items:center;
    }
    .dot{
      width:8px;height:8px;border-radius:999px;background:var(--mut2);
      box-shadow:0 0 12px rgba(126,138,176,.35);
    }
    .dot.good{ background: var(--good); box-shadow:0 0 14px rgba(68,215,168,.38); }
    .dot.warn{ background: var(--warn); box-shadow:0 0 14px rgba(255,209,102,.33); }
    .dot.bad{  background: var(--bad);  box-shadow:0 0 14px rgba(255,93,122,.33); }

    .grid{
      display:grid;
      grid-template-columns: 1.05fr .95fr;
      gap: 14px;
      align-items:start;
    }
    @media (max-width: 980px){
      .grid{ grid-template-columns:1fr; }
    }
    .card{
      background: var(--card);
      border: 1px solid rgba(34,58,124,.55);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      overflow:hidden;
    }
    .card > .hd{
      padding: 14px 14px 12px;
      border-bottom: 1px solid rgba(34,58,124,.35);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      background: linear-gradient(180deg, rgba(13,21,48,.75), rgba(13,21,48,.35));
    }
    .card > .hd h2{
      margin:0;
      font-size: 14px;
      letter-spacing: .15px;
    }
    .card > .hd .mini{
      font-size: 12px;
      color: var(--mut2);
      display:flex;
      align-items:center;
      gap: 8px;
      flex-wrap:wrap;
    }
    .card > .bd{
      padding: 14px;
    }
    .row{
      display:flex;
      gap: 10px;
      flex-wrap:wrap;
      align-items:flex-end;
    }
    .field{
      display:flex;
      flex-direction:column;
      gap: 6px;
      flex: 1 1 240px;
      min-width: 220px;
    }
    .field label{
      font-size: 12px;
      color: var(--mut);
      display:flex;
      justify-content:space-between;
      gap: 8px;
    }
    .hint{ color: var(--mut2); font-size: 11px; }
    input, select, textarea{
      width:100%;
      padding: 10px 10px;
      border-radius: var(--r2);
      border: 1px solid rgba(34,58,124,.7);
      background: rgba(7,10,18,.55);
      color: var(--txt);
      outline: none;
      font-family: var(--mono);
      font-size: 12px;
    }
    textarea{ min-height: 110px; resize: vertical; line-height: 1.35; }
    input:focus, select:focus, textarea:focus{
      border-color: rgba(122,167,255,.9);
      box-shadow: 0 0 0 3px rgba(122,167,255,.15);
    }
    .btn{
      border: 1px solid rgba(122,167,255,.6);
      background: linear-gradient(180deg, rgba(122,167,255,.24), rgba(122,167,255,.12));
      color: var(--txt);
      padding: 10px 12px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 12px;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap: 8px;
      user-select:none;
    }
    .btn:hover{ border-color: rgba(155,255,215,.55); }
    .btn:active{ transform: translateY(1px); }
    .btn.ghost{
      background: rgba(13,21,48,.25);
      border-color: rgba(34,58,124,.75);
      color: var(--mut);
      font-weight: 600;
    }
    .btn.bad{
      border-color: rgba(255,93,122,.65);
      background: linear-gradient(180deg, rgba(255,93,122,.22), rgba(255,93,122,.09));
    }
    .btn.good{
      border-color: rgba(68,215,168,.65);
      background: linear-gradient(180deg, rgba(68,215,168,.20), rgba(68,215,168,.08));
    }
    .btn.small{
      padding: 7px 10px;
      border-radius: 10px;
      font-size: 11px;
    }
    .mono{ font-family: var(--mono); }
    .kv{
      display:grid;
      grid-template-columns: 190px 1fr;
      gap: 8px 10px;
      align-items:center;
    }
    @media (max-width: 520px){
      .kv{ grid-template-columns: 1fr; }
    }
    .k{ color: var(--mut); font-size: 12px; }
    .v{ font-family: var(--mono); font-size: 12px; overflow-wrap:anywhere; }
    .hr{ height:1px; background: rgba(34,58,124,.35); margin: 12px 0; }
    .tag{
      display:inline-flex;
      align-items:center;
      gap: 6px;
      padding: 6px 9px;
      border-radius: 999px;
      border: 1px solid rgba(34,58,124,.6);
      background: rgba(7,10,18,.35);
      color: var(--mut);
      font-size: 11px;
      white-space:nowrap;
    }
    .tag.good{ border-color: rgba(68,215,168,.55); color: rgba(155,255,215,.95); }
    .tag.warn{ border-color: rgba(255,209,102,.55); color: rgba(255,209,102,.95); }
    .tag.bad{  border-color: rgba(255,93,122,.55); color: rgba(255,93,122,.95); }
    .cols{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 760px){
      .cols{ grid-template-columns: 1fr; }
    }
    .small{
      font-size: 11px;
      color: var(--mut2);
      line-height: 1.35;
    }
    .toastHost{
      position:fixed;
      right: 16px;
      top: 14px;
      width: min(420px, calc(100vw - 32px));
      display:flex;
      flex-direction:column;
      gap: 10px;
      z-index: 50;
      pointer-events:none;
    }
    .toast{
      pointer-events:auto;
      border-radius: 14px;
      border: 1px solid rgba(34,58,124,.65);
      background: rgba(13,21,48,.92);
      box-shadow: var(--shadow);
      padding: 10px 12px;
      display:flex;
      gap: 10px;
      align-items:flex-start;
    }
    .toast .t{ font-weight: 700; font-size: 12px; margin:0; }
    .toast .m{ font-size: 12px; color: var(--mut); margin: 2px 0 0; line-height:1.35; }
    .toast .x{
      margin-left:auto;
      border: none;
      background: transparent;
      color: var(--mut2);
      cursor:pointer;
      font-size: 14px;
      padding: 2px 6px;
    }
    .toast.good{ border-color: rgba(68,215,168,.55); }
    .toast.warn{ border-color: rgba(255,209,102,.55); }
    .toast.bad{  border-color: rgba(255,93,122,.55); }
    .footer{
      padding: 14px 0 0;
      display:flex;
      justify-content:space-between;
      gap: 12px;
      flex-wrap:wrap;
      color: var(--mut2);
      font-size: 11px;
    }
    code.inline{
      font-family: var(--mono);
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 9px;
      border: 1px solid rgba(34,58,124,.6);
      background: rgba(7,10,18,.35);
      color: var(--txt);
    }
  </style>
</head>
<body>
  <div class="toastHost" id="toastHost" aria-live="polite" aria-relevant="additions"></div>

  <div class="wrap">
    <header>
      <div class="brand">
        <div class="logo" aria-hidden="true"></div>
        <div class="title">
          <h1>pearl_waters_01</h1>
          <div class="sub">ClaWMon console — operator signatures, rig state, vault allocations</div>
        </div>
      </div>
      <div class="top-actions">
        <div class="pill"><span class="dot" id="netDot"></span><span id="netLabel">not connected</span></div>
        <button class="btn" id="btnConnect">Connect wallet</button>
        <button class="btn ghost" id="btnDisconnect">Disconnect</button>
      </div>
    </header>

    <div class="grid">
      <section class="card">
        <div class="hd">
          <h2>Connection & contract</h2>
          <div class="mini">
            <span class="tag" id="tagProvider">provider: —</span>
            <span class="tag" id="tagSigner">signer: —</span>
          </div>
        </div>
        <div class="bd">
          <div class="row">
            <div class="field">
              <label>
                <span>Contract address</span>
                <span class="hint">ClaWMon deployment</span>
              </label>
              <input id="inContract" spellcheck="false" placeholder="0x…" />
            </div>
            <div class="field">
              <label>
                <span>RPC override (optional)</span>
                <span class="hint">used if no injected wallet</span>
              </label>
              <input id="inRpc" spellcheck="false" placeholder="https://…" />

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark light" />
  <title>pearl_waters_01 — ClaWMon console</title>
  <style>
    :root{
      --bg0:#070a12;
      --bg1:#0b1020;
      --bg2:#0e162b;
      --card:#0d1530cc;
      --card2:#0d1530f2;
      --edge:#1a2a55;
      --edge2:#223a7c;
      --txt:#eaf0ff;
      --mut:#aab6d6;
      --mut2:#7e8ab0;
      --good:#44d7a8;
      --warn:#ffd166;
      --bad:#ff5d7a;
      --accent:#7aa7ff;
      --accent2:#9bffd7;
      --shadow: 0 10px 24px rgba(0,0,0,.35);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Liberation Sans", sans-serif;
      --r: 18px;
      --r2: 12px;
      --pad: 14px;
      --pad2: 10px;
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: var(--sans);
      color: var(--txt);
      background:
        radial-gradient(1200px 720px at 18% 10%, rgba(122,167,255,.13), transparent 55%),
        radial-gradient(1000px 700px at 82% 18%, rgba(155,255,215,.11), transparent 52%),
        radial-gradient(900px 900px at 44% 88%, rgba(255,209,102,.07), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1) 30%, var(--bg2));
      overflow-x:hidden;
    }
    a{ color: var(--accent); text-decoration:none; }
    a:hover{ text-decoration:underline; }
    .wrap{
      max-width: 1200px;
      margin: 0 auto;
      padding: 18px 16px 44px;
    }
    header{
      display:flex;
      flex-wrap:wrap;
      align-items:flex-end;
      justify-content:space-between;
      gap: 12px;
      padding: 10px 0 16px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap: 12px;
      min-width: 270px;
    }
    .logo{
      width:42px;
      height:42px;
      border-radius:14px;
      background:
        radial-gradient(18px 18px at 35% 35%, rgba(155,255,215,.85), transparent 60%),
        radial-gradient(18px 18px at 70% 70%, rgba(122,167,255,.85), transparent 60%),
        linear-gradient(135deg, rgba(34,58,124,.9), rgba(26,42,85,.9));
      border: 1px solid rgba(122,167,255,.26);
      box-shadow: var(--shadow);
    }
    .title{
      display:flex;
      flex-direction:column;
      gap: 1px;
    }
    .title h1{
      margin:0;
      font-size: 18px;
      letter-spacing:.2px;
    }
    .title .sub{
      color: var(--mut);
      font-size: 13px;
    }
    .top-actions{
      display:flex;
      gap: 10px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .pill{
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(13,21,48,.55);
      border: 1px solid rgba(122,167,255,.2);
      color: var(--mut);
      font-size: 12px;
      display:inline-flex;
      gap: 8px;
      align-items:center;
    }
    .dot{
      width:8px;height:8px;border-radius:999px;background:var(--mut2);
      box-shadow:0 0 12px rgba(126,138,176,.35);
    }
    .dot.good{ background: var(--good); box-shadow:0 0 14px rgba(68,215,168,.38); }
    .dot.warn{ background: var(--warn); box-shadow:0 0 14px rgba(255,209,102,.33); }
    .dot.bad{  background: var(--bad);  box-shadow:0 0 14px rgba(255,93,122,.33); }

    .grid{
      display:grid;
      grid-template-columns: 1.05fr .95fr;
      gap: 14px;
      align-items:start;
    }
    @media (max-width: 980px){
      .grid{ grid-template-columns:1fr; }
    }
    .card{
      background: var(--card);
      border: 1px solid rgba(34,58,124,.55);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      overflow:hidden;
    }
    .card > .hd{
      padding: 14px 14px 12px;
      border-bottom: 1px solid rgba(34,58,124,.35);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      background: linear-gradient(180deg, rgba(13,21,48,.75), rgba(13,21,48,.35));
    }
    .card > .hd h2{
      margin:0;
      font-size: 14px;
      letter-spacing: .15px;
    }
    .card > .hd .mini{
      font-size: 12px;
      color: var(--mut2);
      display:flex;
      align-items:center;
      gap: 8px;
      flex-wrap:wrap;
    }
    .card > .bd{
      padding: 14px;
    }
    .row{
      display:flex;
      gap: 10px;
      flex-wrap:wrap;
      align-items:flex-end;
    }
    .field{
      display:flex;
      flex-direction:column;
      gap: 6px;
      flex: 1 1 240px;
      min-width: 220px;
    }
    .field label{
      font-size: 12px;
      color: var(--mut);
      display:flex;
      justify-content:space-between;
      gap: 8px;
    }
    .hint{ color: var(--mut2); font-size: 11px; }
    input, select, textarea{
      width:100%;
      padding: 10px 10px;
      border-radius: var(--r2);
      border: 1px solid rgba(34,58,124,.7);
      background: rgba(7,10,18,.55);
